syntax = "proto3";

// Package monitor provides a service for checking uptime status of various internal services.
package monitor;

// MonitorService defines the gRPC interface for querying service health/uptime.
service MonitorService {
  // GetStatus returns the current status of a specific service identified by its name.
  rpc GetStatus (StatusRequest) returns (StatusResponse);
}

// StatusRequest contains the name of the service to query.
message StatusRequest {
  string service_name = 1; // e.g., "AuthService", "Database"
}

// StatusResponse returns the current health status and the timestamp of the last check.
message StatusResponse {
  string status = 1;     // e.g., "OK", "DOWN", "DEGRADED"
  string last_check = 2; // ISO 8601 timestamp
}
